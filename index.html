<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPV World</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #f2efe8; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

  #canvas-wrapper { position: fixed; inset: 0; z-index: 0; }
  #canvas-wrapper canvas { display: block; }

  #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

  #logo {
    position: absolute; top: 32px; left: 40px;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: #1a1108; opacity: 0.32;
  }

  /* Chapter dots */
  #dots {
    position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(26,17,8,0.2);
    transition: background 0.5s, transform 0.5s;
  }
  .dot.active { background: #ff4800; transform: scale(1.5); }

  /* Chapter label */
  #chapter-label {
    position: absolute;
    bottom: 66px; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 700; letter-spacing: 0.3em;
    text-transform: uppercase; color: #ff4800;
    opacity: 0; transition: opacity 0.6s;
    white-space: nowrap;
  }
  #chapter-label.visible { opacity: 1; }

  /* Progress bar */
  #progress-bar {
    position: absolute; bottom: 0; left: 0;
    height: 2px; width: 0%;
    background: #ff4800; transition: width 0.08s linear;
  }

  /* Scroll hint */
  #scroll-hint {
    position: absolute; bottom: 58px; right: 44px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 1; transition: opacity 0.8s;
  }
  #scroll-hint.hidden { opacity: 0; }
  #scroll-hint span {
    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: #1a1108; opacity: 0.35;
  }
  .arrow-line {
    width: 1px; height: 26px;
    background: linear-gradient(to bottom, #ff4800, transparent);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

  /* CTA */
  #cta {
    position: absolute; bottom: 76px; left: 50%; transform: translateX(-50%);
    text-align: center; opacity: 0; transition: opacity 0.7s;
    pointer-events: none; white-space: nowrap;
  }
  #cta.visible { opacity: 1; pointer-events: auto; }
  #cta p {
    font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase;
    color: #1a1108; opacity: 0.42; margin-bottom: 14px;
  }
  .cta-form { display: flex; }
  .cta-form input[type="email"] {
    flex: 1; padding: 12px 16px; border: 1.5px solid rgba(26,17,8,0.28);
    border-right: none; background: rgba(242,239,232,0.88);
    font-size: 13px; color: #1a1108; outline: none; width: 210px;
  }
  .cta-form input::placeholder { color: #1a1108; opacity: 0.3; }
  .cta-form button {
    padding: 12px 18px; background: #ff4800; color: #fff;
    border: 1.5px solid #ff4800;
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .cta-form button:hover { background: #1a1108; border-color: #1a1108; }

  #scroll-space { height: 600vh; pointer-events: none; }
</style>
</head>
<body>

<div id="canvas-wrapper"><canvas id="c"></canvas></div>

<div id="ui">
  <div id="logo">FPV World</div>

  <div id="dots">
    <div class="dot" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
    <div class="dot" id="dot4"></div>
  </div>
  <div id="chapter-label"></div>

  <div id="progress-bar"></div>

  <div id="scroll-hint">
    <span>Scroll</span>
    <div class="arrow-line"></div>
  </div>

  <div id="cta">
    <p>Be first to fly</p>
    <div class="cta-form">
      <input type="email" placeholder="your@email.com">
      <button>Notify Me</button>
    </div>
  </div>
</div>

<div id="scroll-space"></div>

<script>
  window._sp = 0;
  window.addEventListener('scroll', function() {
    var max = document.body.scrollHeight - window.innerHeight;
    if (max > 0) window._sp = Math.min(window.scrollY / max, 1);
  }, { passive: true });
</script>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';

// ─── RENDERER ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xf4f2f8, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xf4f2f8, 0.008);

const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 4.5, 11);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── LIGHTS ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xfff5e8, 0.55);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff8f0, 2.5);
keyLight.position.set(10, 18, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width  = 1024;
keyLight.shadow.mapSize.height = 1024;
keyLight.shadow.camera.near    = 1;
keyLight.shadow.camera.far     = 50;
keyLight.shadow.camera.left    = -12;
keyLight.shadow.camera.right   = 12;
keyLight.shadow.camera.top     = 12;
keyLight.shadow.camera.bottom  = -12;
keyLight.shadow.bias = -0.0003;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xff8040, 0.38);
fillLight.position.set(-12, 4, 6);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xfff0d8, 0.55);
rimLight.position.set(2, -6, -14);
scene.add(rimLight);

// ─── WAVE TERRAIN ────────────────────────────────────────────────────────────
// Horizontal plane, Y-displacement waves — same pattern as original first build
// AdditiveBlending: grid lines glow ON TOP of background color
const TERR_VERT = `
  varying vec2 vUv; varying float vH; uniform float uTime;
  void main(){
    vUv = uv; vec3 p = position;
    // Plane is rotated -90deg on X, so local Z = world Y (up/down)
    // Displace p.z to get visible 3D waves from camera perspective
    float d = length(p.xy);
    float wave = sin(p.x * 0.12 + uTime * 0.6) * cos(p.y * 0.09 + uTime * 0.4) * 3.2
               + sin(p.x * 0.28 - uTime * 0.8) * 1.4
               + cos(p.y * 0.20 + uTime * 0.55) * 1.8
               + sin((p.x + p.y) * 0.15 - uTime * 0.7) * 1.0;
    // Flatten center where cube sits (radius ~8 units)
    float flatMask = smoothstep(3.0, 10.0, d);
    p.z += wave * flatMask;
    vH = p.z;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
  }`;

const TERR_FRAG = `
  varying vec2 vUv; varying float vH; uniform float uTime;
  void main(){
    vec2 g = fract(vUv * 38.0); float lw = 0.028;
    float lx = step(lw, g.x) * step(lw, 1.0 - g.x);
    float ly = step(lw, g.y) * step(lw, 1.0 - g.y);
    float grid = 1.0 - min(lx, ly);
    float h = clamp((vH + 3.5) / 7.0, 0.0, 1.0);
    vec3 lo = vec3(0.12, 0.30, 0.82);
    vec3 hi = vec3(0.18, 0.65, 0.95);
    vec3 col = mix(lo, hi, h);
    float pulse = sin(vUv.y * 55.0 - uTime * 4.5) * 0.5 + 0.5;
    col += pulse * 0.22 * hi;
    float fade = 1.0 - smoothstep(0.55, 1.0, length(vUv - 0.5) * 2.0);
    col *= (1.8 + h * 0.8);
    gl_FragColor = vec4(col, grid * fade);
  }`;

const terrUni = { uTime: { value: 0 } };
const terrainGeo = new THREE.PlaneGeometry(220, 220, 130, 130);
const terrain = new THREE.Mesh(terrainGeo, new THREE.ShaderMaterial({
  uniforms: terrUni,
  vertexShader: TERR_VERT,
  fragmentShader: TERR_FRAG,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide,
}));
terrain.rotation.x = -Math.PI / 2;
scene.add(terrain);

// ─── CUBE FACE TEXTURES ──────────────────────────────────────────────────────
// BoxGeometry face order: +X(0) -X(1) +Y(2) -Y(3) +Z(4) -Z(5)
//
// Camera orbits starting from +Z front:
//   sp≈0.00 → camera at (0, 4.5, 11):   sees +Z (mat[4]) — COMING SOON
//   sp≈0.20 → camera at (11, 4.5, 0):   sees +X (mat[0]) — CONNECT
//   sp≈0.40 → camera at (0, 4.5, -11):  sees -Z (mat[5]) — SHARE SPOTS
//   sp≈0.60 → camera at (-11, 4.5, 0):  sees -X (mat[1]) — FLY TOGETHER
//   sp≈0.80 → camera at (0, 12, 3):     sees +Y (mat[2]) — FPV WORLD
//   sp≈1.00 → camera at (8, 6, 9):      angled view — CTA

function makeFace({ bg = '#f2efe8', lines = [], size = 512 }) {
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const ctx = cv.getContext('2d');

  // Background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  // Thin border
  const isDark = bg === '#0f0e0c';
  const isOrange = bg === '#ff4800';
  ctx.strokeStyle = isDark ? 'rgba(255,72,0,0.3)' : isOrange ? 'rgba(255,255,255,0.25)' : 'rgba(26,17,8,0.1)';
  ctx.lineWidth = 2;
  ctx.strokeRect(24, 24, size-48, size-48);

  // Corner brackets
  const co = 28, cl = 44;
  ctx.strokeStyle = isDark ? '#ff4800' : isOrange ? 'rgba(255,255,255,0.6)' : '#ff4800';
  ctx.lineWidth = 3;
  [
    [co, co+cl, co, co, co+cl, co],
    [size-co-cl, co, size-co, co, size-co, co+cl],
    [co, size-co-cl, co, size-co, co+cl, size-co],
    [size-co-cl, size-co, size-co, size-co, size-co, size-co-cl]
  ].forEach(([x1,y1,x2,y2,x3,y3]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.stroke();
  });

  // Text layout
  const GAP = 10;
  let totalH = lines.reduce((s, l, i) => s + l.size + (i < lines.length-1 ? GAP : 0), 0);
  let y = (size - totalH) / 2 + lines[0].size * 0.82;

  lines.forEach((l, i) => {
    const weight = l.role === 'main' ? '800' : l.role === 'label' ? '700' : '500';
    ctx.font = `${weight} ${l.size}px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';

    let col;
    if (l.color) {
      col = l.color;
    } else if (isOrange) {
      col = l.role === 'sub' ? 'rgba(255,255,255,0.65)' : '#ffffff';
    } else if (isDark) {
      col = l.role === 'sub' ? 'rgba(255,255,255,0.38)' : '#ff4800';
    } else {
      col = l.role === 'sub' ? 'rgba(26,17,8,0.38)' : '#ff4800';
    }

    if (l.role === 'main') {
      ctx.shadowColor = isOrange ? 'rgba(255,255,255,0.4)' : '#ff4800';
      ctx.shadowBlur = 28;
    } else {
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = col;
    ctx.fillText(l.text, size/2, y);
    ctx.shadowBlur = 0;

    if (i < lines.length-1) y += l.size + GAP;
  });

  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// Material array in BoxGeometry order: [+X, -X, +Y, -Y, +Z, -Z]
const cubeMaterials = [
  // [0] +X — CONNECT (seen from right, sp≈0.20)
  new THREE.MeshStandardMaterial({ map: makeFace({ lines: [
    { text: 'CONNECT', role: 'main', size: 88 },
    { text: 'Find pilots near you', role: 'sub', size: 30 },
  ]}), roughness: 0.08, metalness: 0.02 }),

  // [1] -X — FLY TOGETHER (seen from left, sp≈0.60)
  new THREE.MeshStandardMaterial({ map: makeFace({ bg: '#ff4800', lines: [
    { text: 'FLY',      role: 'main', size: 136 },
    { text: 'TOGETHER', role: 'main', size: 86 },
    { text: 'Join the community', role: 'sub', size: 28 },
  ]}), roughness: 0.08, metalness: 0.02 }),

  // [2] +Y top — FPV WORLD (seen from above, sp≈0.80)
  new THREE.MeshStandardMaterial({ map: makeFace({ bg: '#0f0e0c', lines: [
    { text: 'FPV',   role: 'main', size: 100 },
    { text: 'WORLD', role: 'main', size: 100 },
    { text: 'fpvworld.app', role: 'sub', size: 26, color: 'rgba(255,255,255,0.35)' },
  ]}), roughness: 0.08, metalness: 0.02 }),

  // [3] -Y bottom — never visible (on the ground)
  new THREE.MeshStandardMaterial({ color: 0x1a1108, roughness: 0.5, metalness: 0 }),

  // [4] +Z front — COMING SOON (first view, sp≈0.00)
  new THREE.MeshStandardMaterial({ map: makeFace({ lines: [
    { text: 'FPV WORLD', role: 'label', size: 48, color: 'rgba(26,17,8,0.45)' },
    { text: 'COMING',    role: 'main',  size: 96 },
    { text: 'SOON',      role: 'main',  size: 96 },
    { text: '2026',      role: 'sub',   size: 28  },
  ]}), roughness: 0.08, metalness: 0.02 }),

  // [5] -Z back — SHARE SPOTS (seen from behind, sp≈0.40)
  new THREE.MeshStandardMaterial({ map: makeFace({ bg: '#0f0e0c', lines: [
    { text: 'SHARE',  role: 'main', size: 136 },
    { text: 'SPOTS',  role: 'main', size: 136 },
    { text: 'Discover fly locations', role: 'sub', size: 28, color: 'rgba(255,255,255,0.36)' },
  ]}), roughness: 0.08, metalness: 0.02 }),
];

// Cube sits directly on terrain — terrain at y=0, cube center at y=2.2
const CUBE_HALF = 2.2;
const CUBE_Y = CUBE_HALF; // 2.2
const cube = new THREE.Mesh(new THREE.BoxGeometry(4.4, 4.4, 4.4), cubeMaterials);
cube.position.y = CUBE_Y;
cube.castShadow = true;
scene.add(cube);

// Edge wireframe
const edgeMat = new THREE.LineBasicMaterial({
  color: 0xff4800, transparent: true, opacity: 0.12,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const edgeMesh = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(4.42, 4.42, 4.42)),
  edgeMat
);
edgeMesh.position.y = CUBE_Y;
scene.add(edgeMesh);

// ─── DRONE ──────────────────────────────────────────────────────────────────
const drone = new THREE.Group();
scene.add(drone);

const bodyMat  = new THREE.MeshStandardMaterial({ color: 0x1a1108, roughness: 0.35, metalness: 0.6 });
const armMat   = new THREE.MeshStandardMaterial({ color: 0x2a2218, roughness: 0.4,  metalness: 0.5 });
const motorMat = new THREE.MeshStandardMaterial({ color: 0x111010, roughness: 0.3,  metalness: 0.8 });
const propMat  = new THREE.MeshBasicMaterial({ color: 0xff4800, transparent: true, opacity: 0.28, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false });
const camMat   = new THREE.MeshStandardMaterial({ color: 0x1a5fff, roughness: 0.2,  metalness: 0.9 });
const ledMat   = new THREE.MeshBasicMaterial({ color: 0xff4800, blending: THREE.AdditiveBlending });

// Body
const body = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.12, 0.42), bodyMat);
body.castShadow = true;
drone.add(body);

// FPV camera snout
const camBody = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.12, 0.08), camMat);
camBody.position.set(0, 0.02, 0.22);
drone.add(camBody);
const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.038, 0.038, 0.04, 8), camMat);
lens.rotation.x = Math.PI / 2;
lens.position.set(0, 0.02, 0.26);
drone.add(lens);

// 4 arms at 45° diagonals
[[-1,1],[1,1],[1,-1],[-1,-1]].forEach(([sx, sz], idx) => {
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.55, 6), armMat);
  arm.rotation.z = Math.PI / 2;
  const angle = Math.atan2(sz, sx);
  arm.rotation.y = -angle;
  const cx = sx * 0.27, cz = sz * 0.27;
  arm.position.set(cx, 0, cz);
  arm.castShadow = true;
  drone.add(arm);

  // Motor
  const motor = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.06, 8), motorMat);
  motor.position.set(sx * 0.52, 0.04, sz * 0.52);
  motor.castShadow = true;
  drone.add(motor);

  // Prop disc
  const prop = new THREE.Mesh(new THREE.CircleGeometry(0.16, 16), propMat);
  prop.rotation.x = -Math.PI / 2;
  prop.position.set(sx * 0.52, 0.07, sz * 0.52);
  drone.add(prop);

  // LED
  const led = new THREE.Mesh(new THREE.SphereGeometry(0.022, 6, 6), ledMat);
  led.position.set(sx * 0.52, 0.07, sz * 0.52);
  drone.add(led);
});

// Underglow point light
const droneLight = new THREE.PointLight(0xff4800, 1.2, 3.5);
droneLight.position.set(0, -0.2, 0);
drone.add(droneLight);

// ─── CAMERA SPLINE ──────────────────────────────────────────────────────────
// 6 waypoints → camera visits all 5 visible faces in order, ends at angled CTA view
// Cube center at y=2.2, orbit radius ~11 for sides, ~13 for top
const camSpline = new THREE.CatmullRomCurve3([
  new THREE.Vector3(  0, 3.5,  13),   // sp=0.0 front  (+Z) — COMING SOON
  new THREE.Vector3( 13, 3.5,   0),   // sp=0.2 right  (+X) — CONNECT
  new THREE.Vector3(  0, 3.5, -13),   // sp=0.4 back   (-Z) — SHARE SPOTS
  new THREE.Vector3(-13, 3.5,   0),   // sp=0.6 left   (-X) — FLY TOGETHER
  new THREE.Vector3(  0, 14,    3),   // sp=0.8 top    (+Y) — FPV WORLD
  new THREE.Vector3(  9, 5.5,  11),   // sp=1.0 CTA angle view
]);

const tgtSpline = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, CUBE_Y, 0),
  new THREE.Vector3(0, CUBE_Y, 0),
  new THREE.Vector3(0, CUBE_Y, 0),
  new THREE.Vector3(0, CUBE_Y, 0),
  new THREE.Vector3(0, CUBE_Y + 1.2, 0),
  new THREE.Vector3(0, CUBE_Y, 0),
]);

// ─── FLOATING PARTICLES ─────────────────────────────────────────────────────
const N = 160;
const pArr = new Float32Array(N * 3);
const pMeta = Array.from({ length: N }, () => ({
  theta: Math.random() * Math.PI * 2,
  phi: Math.PI * 0.2 + Math.random() * Math.PI * 0.5,  // upper hemisphere
  r: 6 + Math.random() * 8,
  spd: (Math.random() - 0.5) * 0.18,
  drift: Math.random() * Math.PI * 2,
  y0: CUBE_HALF,
}));
pMeta.forEach((m, i) => {
  pArr[i*3]   = m.r * Math.sin(m.phi) * Math.cos(m.theta);
  pArr[i*3+1] = m.y0 + m.r * Math.cos(m.phi);
  pArr[i*3+2] = m.r * Math.sin(m.phi) * Math.sin(m.theta);
});
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
const pMat = new THREE.PointsMaterial({
  color: 0xff4800, size: 0.055, transparent: true, opacity: 0.4,
  sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
const ptcls = new THREE.Points(pGeo, pMat);
scene.add(ptcls);

// ─── UI REFS ─────────────────────────────────────────────────────────────────
const progressBar   = document.getElementById('progress-bar');
const scrollHint    = document.getElementById('scroll-hint');
const ctaEl         = document.getElementById('cta');
const chapterLabel  = document.getElementById('chapter-label');
const dots          = [0,1,2,3,4].map(i => document.getElementById('dot' + i));

const CHAPTER_NAMES = ['COMING SOON', 'CONNECT', 'SHARE SPOTS', 'FLY TOGETHER', 'FPV WORLD'];

// ─── TICK ────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let smoothP = 0;
let lastChapter = -1;

function ease(x) { return x < 0.5 ? 2*x*x : -1+(4-2*x)*x; }
function clamp01(x) { return Math.max(0, Math.min(1, x)); }

// Camera lerp targets
let camPos = new THREE.Vector3(0, 3.5, 13);
let camLookAt = new THREE.Vector3(0, CUBE_Y, 0);

function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  smoothP += (window._sp - smoothP) * 0.055;
  const sp = Math.min(smoothP, 0.9999);

  progressBar.style.width = (sp * 100).toFixed(1) + '%';
  scrollHint.classList.toggle('hidden', sp > 0.04);

  // ── Chapter for UI ───────────────────────────────────────────────────────
  // Each chapter occupies 0.2 of scroll (5 chapters + end)
  // Chapter transitions at sp: 0.1, 0.3, 0.5, 0.7, 0.9
  const chIdx = Math.min(Math.floor(sp / 0.2), 4);
  dots.forEach((d, i) => d.classList.toggle('active', i === chIdx));

  if (chIdx !== lastChapter) {
    chapterLabel.textContent = CHAPTER_NAMES[chIdx];
    chapterLabel.classList.remove('visible');
    setTimeout(() => chapterLabel.classList.add('visible'), 50);
    lastChapter = chIdx;
  }

  // CTA: last 20% of scroll
  ctaEl.classList.toggle('visible', sp > 0.88);
  if (sp > 0.88) chapterLabel.classList.remove('visible');

  // ── Camera follows spline ────────────────────────────────────────────────
  const targetCamPos  = camSpline.getPoint(sp);
  const targetLookAt  = tgtSpline.getPoint(sp);

  // Smooth lerp — 0.07 is the sweet spot (not jerky, not laggy)
  camPos.lerp(targetCamPos, 0.07);
  camLookAt.lerp(targetLookAt, 0.07);

  camera.position.copy(camPos);
  camera.lookAt(camLookAt);

  // ── Terrain animate ──────────────────────────────────────────────────────
  terrUni.uTime.value = t;

  // ── Edge glow pulse ──────────────────────────────────────────────────────
  edgeMat.opacity = 0.08 + Math.sin(t * 1.1) * 0.04;

  // ── Drone flight path ────────────────────────────────────────────────────
  // Flies a lazy figure-8 / orbit around the cube, stays out of camera's way
  const dT = t * 0.38;
  const dRadius = 8 + Math.sin(t * 0.21) * 1.5;
  drone.position.set(
    Math.sin(dT) * dRadius,
    CUBE_Y + 2.5 + Math.sin(t * 0.55) * 1.2,
    Math.cos(dT * 0.7) * dRadius
  );
  // Bank into the turn
  drone.rotation.z = -Math.cos(dT) * 0.28;
  drone.rotation.x =  Math.sin(t * 0.55) * 0.08;
  // Face direction of travel
  const nextX = Math.sin(dT + 0.05) * dRadius;
  const nextZ = Math.cos((dT + 0.05) * 0.7) * dRadius;
  drone.rotation.y = Math.atan2(nextX - drone.position.x, nextZ - drone.position.z);

  // ── Particles orbit cube ─────────────────────────────────────────────────
  const pa = ptcls.geometry.attributes.position;
  for (let i = 0; i < N; i++) {
    const m = pMeta[i];
    m.theta += m.spd * 0.008;
    pa.array[i*3]   = m.r * Math.sin(m.phi) * Math.cos(m.theta + t * 0.025);
    pa.array[i*3+1] = m.y0 + m.r * Math.cos(m.phi) + Math.sin(t*0.22 + m.drift) * 0.28;
    pa.array[i*3+2] = m.r * Math.sin(m.phi) * Math.sin(m.theta + t * 0.025);
  }
  pa.needsUpdate = true;

  renderer.render(scene, camera);
}
tick();
</script>
