<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPV World</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #f5f2ee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #0a0a0a;
  }

  #canvas-wrapper {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  #canvas-wrapper canvas { display: block; }

  #ui {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }

  #logo {
    position: absolute;
    top: 36px;
    left: 44px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #0a0a0a;
    opacity: 0.45;
  }

  #scroll-hint {
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 1;
    transition: opacity 0.8s ease;
  }
  #scroll-hint.hidden { opacity: 0; }
  #scroll-hint span {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #0a0a0a;
    opacity: 0.4;
  }
  .scroll-arrow {
    width: 1px;
    height: 30px;
    background: linear-gradient(to bottom, #ff4800, transparent);
    animation: arrowPulse 1.7s ease-in-out infinite;
  }
  @keyframes arrowPulse {
    0%, 100% { opacity: 0.25; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.2); }
  }

  #progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    width: 0%;
    background: #ff4800;
    transition: width 0.08s linear;
  }

  .scene {
    position: absolute;
    opacity: 0;
    transition: opacity 0.75s ease;
    pointer-events: none;
  }
  .scene.visible { opacity: 1; }

  /* Scene 0 — title above cube */
  #s0 {
    top: 50%;
    left: 50%;
    transform: translate(-50%, -195px);
    text-align: center;
  }
  #s0 .eyebrow {
    font-size: 11px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: #ff4800;
    margin-bottom: 16px;
    font-weight: 600;
  }
  #s0 h1 {
    font-size: clamp(48px, 8vw, 92px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 0.90;
    color: #0a0a0a;
  }
  #s0 h1 span { color: #ff4800; }

  /* Scene 3 — CTA */
  #s3 {
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: auto;
    white-space: nowrap;
  }
  #s3 p {
    font-size: 11px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: #0a0a0a;
    opacity: 0.45;
    margin-bottom: 18px;
  }
  .cta-form {
    display: flex;
    gap: 0;
    width: 340px;
  }
  .cta-form input[type="email"] {
    flex: 1;
    padding: 13px 17px;
    border: 1.5px solid rgba(10,10,10,0.35);
    border-right: none;
    background: rgba(245,242,238,0.85);
    font-size: 13px;
    letter-spacing: 0.05em;
    color: #0a0a0a;
    outline: none;
    backdrop-filter: blur(4px);
  }
  .cta-form input::placeholder { color: #0a0a0a; opacity: 0.3; }
  .cta-form button {
    padding: 13px 20px;
    background: #ff4800;
    color: #fff;
    border: 1.5px solid #ff4800;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .cta-form button:hover { background: #0a0a0a; border-color: #0a0a0a; }

  /* Scroll space */
  #scroll-space {
    height: 600vh;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="canvas-wrapper"><canvas id="c"></canvas></div>

<div id="ui">
  <div id="logo">FPV World</div>

  <div id="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </div>

  <div id="progress-bar"></div>

  <div class="scene" id="s0">
    <div class="eyebrow">Coming Soon</div>
    <h1>FPV<br><span>World</span></h1>
  </div>

  <div class="scene" id="s3">
    <p>Be first to know</p>
    <div class="cta-form">
      <input type="email" placeholder="your@email.com">
      <button>Notify Me</button>
    </div>
  </div>
</div>

<div id="scroll-space"></div>

<!-- Scroll tracking — plain script, always runs -->
<script>
  window._sp = 0;
  window.addEventListener('scroll', function() {
    var max = document.body.scrollHeight - window.innerHeight;
    if (max > 0) window._sp = Math.min(window.scrollY / max, 1);
  }, { passive: true });
</script>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';

// ─── RENDERER ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xf5f2ee, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 18);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── LIGHTS ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);

const key = new THREE.DirectionalLight(0xfff8f0, 2.6);
key.position.set(8, 14, 10);
scene.add(key);

const fillLight = new THREE.DirectionalLight(0xff4800, 0.5);
fillLight.position.set(-12, -4, 6);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xfff0e0, 0.8);
rimLight.position.set(0, -10, -14);
scene.add(rimLight);

// ─── CANVAS FACE TEXTURES ───────────────────────────────────────────────────
function makeFace(cfg) {
  const {
    lines   = [],
    bg      = '#f5f2ee',
    size    = 512,
    dark    = false,
    accent  = false,
  } = cfg;

  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const ctx = cv.getContext('2d');

  // Background
  ctx.fillStyle = dark ? '#0a0a0a' : accent ? '#ff4800' : bg;
  ctx.fillRect(0, 0, size, size);

  // Outer border
  ctx.strokeStyle = dark ? 'rgba(255,72,0,0.35)' : accent ? 'rgba(255,255,255,0.3)' : 'rgba(10,10,10,0.1)';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(20, 20, size - 40, size - 40);

  // Corner brackets
  const co = 24, cl = 38;
  ctx.strokeStyle = dark ? '#ff4800' : accent ? 'rgba(255,255,255,0.7)' : '#ff4800';
  ctx.lineWidth = 2.5;
  // TL
  ctx.beginPath(); ctx.moveTo(co, co + cl); ctx.lineTo(co, co); ctx.lineTo(co + cl, co); ctx.stroke();
  // TR
  ctx.beginPath(); ctx.moveTo(size-co, co+cl); ctx.lineTo(size-co, co); ctx.lineTo(size-co-cl, co); ctx.stroke();
  // BL
  ctx.beginPath(); ctx.moveTo(co, size-co-cl); ctx.lineTo(co, size-co); ctx.lineTo(co+cl, size-co); ctx.stroke();
  // BR
  ctx.beginPath(); ctx.moveTo(size-co, size-co-cl); ctx.lineTo(size-co, size-co); ctx.lineTo(size-co-cl, size-co); ctx.stroke();

  // Compute total text height
  let totalH = 0;
  const gap = 14;
  const parsed = lines.map(l => {
    const sz = l.size || (l.role === 'main' ? 148 : l.role === 'label' ? 64 : 30);
    const weight = l.role === 'main' ? '800' : l.role === 'label' ? '700' : '500';
    const font = `${weight} ${sz}px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
    return { ...l, sz, font };
  });
  parsed.forEach((l, i) => {
    totalH += l.sz;
    if (i < parsed.length - 1) totalH += gap;
  });

  let y = (size - totalH) / 2 + parsed[0].sz * 0.78;

  parsed.forEach((l, i) => {
    ctx.font = l.font;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';

    let color;
    if (accent) {
      color = l.role === 'main' ? '#ffffff' : 'rgba(255,255,255,0.65)';
    } else if (dark) {
      color = l.role === 'main' ? '#ff4800' : 'rgba(255,255,255,0.45)';
    } else {
      color = l.role === 'main' ? '#ff4800' : l.role === 'label' ? '#0a0a0a' : 'rgba(10,10,10,0.38)';
    }

    if (l.role === 'main') {
      ctx.shadowColor = accent ? 'rgba(255,255,255,0.4)' : '#ff4800';
      ctx.shadowBlur = 30;
    } else {
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = color;
    ctx.fillText(l.text, size / 2, y);
    ctx.shadowBlur = 0;

    if (i < parsed.length - 1) y += l.sz + gap;
  });

  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z
const faceMaterials = [
  // +X right
  new THREE.MeshStandardMaterial({ map: makeFace({
    lines: [{ text: 'FPV', role: 'main', size: 172 }, { text: 'fpvworld.app', role: 'sub' }]
  }), roughness: 0.06, metalness: 0.02 }),

  // -X left
  new THREE.MeshStandardMaterial({ map: makeFace({
    lines: [{ text: 'WORLD', role: 'main', size: 128 }, { text: 'fpvworld.app', role: 'sub' }]
  }), roughness: 0.06, metalness: 0.02 }),

  // +Y top — dark
  new THREE.MeshStandardMaterial({ map: makeFace({
    dark: true,
    lines: [{ text: 'FPV', role: 'main', size: 120 }, { text: 'WORLD', role: 'main', size: 120 }]
  }), roughness: 0.06, metalness: 0.02 }),

  // -Y bottom — orange accent
  new THREE.MeshStandardMaterial({ map: makeFace({
    accent: true,
    lines: [{ text: '.APP', role: 'main', size: 148 }]
  }), roughness: 0.06, metalness: 0.02 }),

  // +Z front — COMING SOON (this is what you see first)
  new THREE.MeshStandardMaterial({ map: makeFace({
    lines: [
      { text: 'COMING', role: 'label', size: 72 },
      { text: 'SOON',   role: 'label', size: 72 },
      { text: '2025',   role: 'sub' },
    ]
  }), roughness: 0.06, metalness: 0.02 }),

  // -Z back
  new THREE.MeshStandardMaterial({ map: makeFace({
    lines: [{ text: 'JOIN', role: 'label', size: 72 }, { text: 'THE LIST', role: 'label', size: 60 }]
  }), roughness: 0.06, metalness: 0.02 }),
];

const cube = new THREE.Mesh(new THREE.BoxGeometry(4.2, 4.2, 4.2), faceMaterials);
scene.add(cube);

// ─── EDGE GLOW (wireframe overlay) ──────────────────────────────────────────
const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(4.22, 4.22, 4.22));
const edgesMat = new THREE.LineBasicMaterial({
  color: 0xff4800,
  transparent: true,
  opacity: 0.18,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const edges = new THREE.LineSegments(edgesGeo, edgesMat);
scene.add(edges);

// ─── FLOOR REFLECTION PLANE ─────────────────────────────────────────────────
const floorMat = new THREE.MeshBasicMaterial({
  color: 0x0a0a0a,
  transparent: true,
  opacity: 0,
  depthWrite: false,
});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2.8;
scene.add(floor);

// ─── ORBITAL PARTICLES ──────────────────────────────────────────────────────
const N = 240;
const pPos = new Float32Array(N * 3);
const pMeta = [];
for (let i = 0; i < N; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const r     = 5 + Math.random() * 8;
  pMeta.push({ theta, phi, r, spd: (Math.random() - 0.5) * 0.22, drift: Math.random() * Math.PI * 2 });
  pPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  pPos[i*3+1] = r * Math.cos(phi);
  pPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const pMat = new THREE.PointsMaterial({
  color: 0xff4800, size: 0.052, transparent: true, opacity: 0.5,
  sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
const ptcls = new THREE.Points(pGeo, pMat);
scene.add(ptcls);

// ─── UI REFS ────────────────────────────────────────────────────────────────
const s0          = document.getElementById('s0');
const s3          = document.getElementById('s3');
const progressBar = document.getElementById('progress-bar');
const scrollHint  = document.getElementById('scroll-hint');

// ─── TICK ────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let smoothP = 0;

function ease(x) { return x < 0.5 ? 2*x*x : -1+(4-2*x)*x; }
function clamp01(x) { return Math.max(0, Math.min(1, x)); }

// Cube starts facing +Z (COMING SOON face toward camera) ─ perfect
cube.rotation.y = 0;
cube.rotation.x = 0;

function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  smoothP += (window._sp - smoothP) * 0.055;
  const sp = Math.min(smoothP, 0.9999);

  // Progress bar
  progressBar.style.width = (sp * 100).toFixed(1) + '%';

  // Scroll hint
  if (sp > 0.06) scrollHint.classList.add('hidden');
  else scrollHint.classList.remove('hidden');

  // Scene visibility
  s0.classList.toggle('visible', sp < 0.26);
  s3.classList.toggle('visible', sp > 0.74);

  // ── Camera zoom in ────────────────────────────────────────────────────────
  // 0%→50%: 18→6, 50%→80%: 6→2.6, 80%→100%: 2.6→7 (pull back for CTA)
  let targetZ;
  if (sp < 0.50) {
    targetZ = 18 - ease(sp / 0.50) * 12;
  } else if (sp < 0.80) {
    targetZ = 6  - ease((sp - 0.50) / 0.30) * 3.4;
  } else {
    targetZ = 2.6 + ease((sp - 0.80) / 0.20) * 4.4;
  }

  // Subtle floating camera drift at the start
  const drift = 1 - clamp01(sp / 0.6);
  camera.position.set(
    Math.sin(t * 0.14) * 0.5 * drift,
    Math.cos(t * 0.09) * 0.25 * drift,
    targetZ
  );
  camera.lookAt(0, 0, 0);

  // ── Cube rotation ─────────────────────────────────────────────────────────
  // Continuous slow spin — slows near end so text is readable
  const spinSpeed = 0.0038 * (1 - clamp01((sp - 0.65) / 0.2) * 0.85);
  cube.rotation.y += spinSpeed;
  cube.rotation.x += spinSpeed * 0.38;

  // Gentle float
  cube.position.y = Math.sin(t * 0.52) * 0.11;

  // Sync edge wireframe to cube
  edges.rotation.copy(cube.rotation);
  edges.position.copy(cube.position);

  // Shadow strengthens as camera approaches
  const prox = clamp01(1 - (targetZ - 2.6) / 15.4);
  floorMat.opacity = prox * 0.065;

  // Edge glow pulses
  edgesMat.opacity = 0.12 + Math.sin(t * 1.4) * 0.06;

  // ── Particles ─────────────────────────────────────────────────────────────
  const posAttr = ptcls.geometry.attributes.position;
  for (let i = 0; i < N; i++) {
    const m = pMeta[i];
    m.theta += m.spd * 0.012;
    posAttr.array[i*3]   = m.r * Math.sin(m.phi) * Math.cos(m.theta + t * 0.035);
    posAttr.array[i*3+1] = m.r * Math.cos(m.phi) + Math.sin(t * 0.28 + m.drift) * 0.32;
    posAttr.array[i*3+2] = m.r * Math.sin(m.phi) * Math.sin(m.theta + t * 0.035);
  }
  posAttr.needsUpdate = true;
  // Fade particles when very close
  pMat.opacity = 0.5 * (1 - clamp01((sp - 0.60) / 0.18));

  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
